name: "[test] docker matrix generation"

on:
  pull_request:
    paths:
      - docker/**

jobs:
  build-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          list-files: json
          filters: |
            docker:
              - 'docker/**'
      - name: Debug changed files
        env:
          CHANGED_FILES: ${{ steps.filter.outputs.docker_files }}
        run: echo "$CHANGED_FILES" | jq .
      - id: build-matrix
        env:
          CHANGED_FILES: ${{ steps.filter.outputs.docker_files }}
        run: |
          ALL_BUILDS='[
            {"dockerfile":"terraform.Dockerfile","platforms":"linux/amd64,linux/arm64","image_name":"renvc-terraform","project":"renvc-dev"},
            {"dockerfile":"test-engine.Dockerfile","platforms":"linux/amd64,linux/arm64","image_name":"test-engine","project":"renvc-dev"},
            {"dockerfile":"eks-kubectl.Dockerfile","platforms":"linux/amd64","image_name":"eks-kubectl","project":"renvc-prod"},
            {"dockerfile":"nexus-sync.Dockerfile","platforms":"linux/amd64","image_name":"nexus-sync","project":"renvc-dev"},
            {"dockerfile":"ivion-restore-tools.Dockerfile","platforms":"linux/amd64","image_name":"ivion-restore-tools","project":"renvc-dev"}
          ]'

          DOCKERFILES=$(echo "$CHANGED_FILES" | jq -r '[.[] | split("/")[-1] | select(endswith(".Dockerfile"))] | .[]')

          for FILE in $(echo "$CHANGED_FILES" | jq -r '[.[] | split("/")[-1] | select(endswith(".Dockerfile") | not)] | .[]'); do
            DOCKERFILES="$DOCKERFILES $(grep -rl "$FILE" docker/*.Dockerfile 2>/dev/null | xargs -r -I{} basename {})"
          done

          MATRIX=$(echo "$ALL_BUILDS" | jq -c --arg dfs "$DOCKERFILES" '
            ($dfs | [splits(" |\n")] | map(select(. != "")) | unique) as $list |
            [.[] | select(.dockerfile | IN($list[]))]
          ')
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  print-matrix:
    needs: build-matrix
    if: needs.build-matrix.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        build: ${{ fromJson(needs.build-matrix.outputs.matrix) }}
    steps:
      - name: Print
        run: |
          echo "image:     ${{ matrix.build.image_name }}"
          echo "file:      ${{ matrix.build.dockerfile }}"
          echo "platforms: ${{ matrix.build.platforms }}"
          echo "project:   ${{ matrix.build.project }}"
