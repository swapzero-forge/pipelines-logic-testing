name: "[test] docker matrix generation"

on:
  pull_request:
    paths:
      - ci/docker/**

jobs:
  build-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          list-files: json
          filters: |
            docker:
              - 'ci/docker/**'
      - name: Debug changed files
        env:
          CHANGED_FILES: ${{ steps.filter.outputs.docker_files }}
        run: echo "$CHANGED_FILES" | jq .
      - id: build-matrix
        env:
          CHANGED_FILES: ${{ steps.filter.outputs.docker_files }}
        run: |
          # full image config - only updated when adding a new image
          ALL_BUILDS=$(yq -o=json ci/docker/builds.yaml)

          # collect directly changed Dockerfiles
          echo "$CHANGED_FILES" | jq -r '.[] | ltrimstr("ci/docker/") | select(endswith(".Dockerfile"))' > /tmp/dockerfiles

          # for other changed files, grep every path component (files and dirs) against all Dockerfiles
          echo "$CHANGED_FILES" | jq -r '.[] | ltrimstr("ci/docker/") | select(endswith(".Dockerfile") | not)' \
            | jq -nR '[inputs] | map(split("/")) | add | .[]' | sort -u | while read -r ITEM; do
            grep -l "$ITEM" ci/docker/*.Dockerfile 2>/dev/null | xargs -r -I{} basename {}
          done >> /tmp/dockerfiles

          # deduplicate and select matching image configs
          MATRIX=$(sort -u /tmp/dockerfiles | jq -cRn --arg config "$ALL_BUILDS" '
            [inputs] as $list |
            $config | fromjson |
            [.[] | select(.dockerfile | IN($list[]))]
          ')
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  print-matrix:
    needs: build-matrix
    if: needs.build-matrix.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        build: ${{ fromJson(needs.build-matrix.outputs.matrix) }}
    steps:
      - name: Print
        run: |
          echo "image:     ${{ matrix.build.image_name }}"
          echo "file:      ${{ matrix.build.dockerfile }}"
          echo "platforms: ${{ matrix.build.platforms }}"
          echo "project:   ${{ matrix.build.project }}"
